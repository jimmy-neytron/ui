name: Publish npm package from PR

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened

  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: npm-publish-pr-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  publish:
    name: Attempt npm publish
    runs-on: ubuntu-latest
    environment: npm-production

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'
          package-manager-cache: false

      - name: Setup npm
        run: npm install --global npm@11

      - name: Install dependencies
        run: npm ci

      - name: Run checks
        run: npm run check

      - name: Test packed package
        run: npm run test:package

      - name: Attempt publishing
        continue-on-error: true
        run: npm publish --access public