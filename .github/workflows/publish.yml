name: Publish npm package

on:
  release:
    types:
      - published

permissions:
  contents: read
  id-token: write

concurrency:
  group: npm-publish-${{ github.event.release.tag_name }}
  cancel-in-progress: false

jobs:
  publish:
    name: Publish to npm
    if: ${{ !github.event.release.prerelease }}
    runs-on: ubuntu-latest
    environment: npm-production

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'
          package-manager-cache: false

      - name: Setup npm
        run: npm install --global npm@11

      - name: Install dependencies
        run: npm ci

      - name: Run checks
        run: npm run check

      - name: Test packed package
        run: npm run test:package

      - name: Verify release tag
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: node -e "const version = require('./package.json').version; if (process.env.RELEASE_TAG !== `v${version}`) { throw new Error(`Release tag ${process.env.RELEASE_TAG} does not match package version v${version}`); }"

      - name: Publish
        run: npm publish --access public
