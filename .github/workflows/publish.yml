name: Publish to npm

on:
  release:
    types:
      - published
  workflow_dispatch:
    inputs:
      tag:
        description: Existing release tag in vX.Y.Z format
        required: true
        type: string

permissions:
  contents: read
  id-token: write

concurrency:
  group: npm-publish-${{ github.event.release.tag_name || inputs.tag }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    environment: npm-production
    env:
      RELEASE_TAG: ${{ github.event.release.tag_name || inputs.tag }}

    steps:
      - name: Checkout release tag
        uses: actions/checkout@v6
        with:
          ref: ${{ env.RELEASE_TAG }}
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          registry-url: https://registry.npmjs.org
          package-manager-cache: false

      - name: Use an OIDC-capable npm CLI
        run: npm install --global npm@12

      - name: Verify tag matches package version
        run: |
          node --input-type=module <<'NODE'
          import { readFile } from 'node:fs/promises';
          const pkg = JSON.parse(await readFile('package.json', 'utf8'));
          const expected = `v${pkg.version}`;
          if (process.env.RELEASE_TAG !== expected) {
            console.error(`Tag ${process.env.RELEASE_TAG} does not match package version ${expected}.`);
            process.exit(1);
          }
          console.log(`Publishing ${pkg.name}@${pkg.version} from ${expected}.`);
          NODE

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Run complete verification
        run: npm run check

      - name: Test packed package
        run: npm run test:package

      - name: Ensure version is not already published
        run: |
          node --input-type=module <<'NODE'
          import { readFile } from 'node:fs/promises';
          import { spawnSync } from 'node:child_process';
          const pkg = JSON.parse(await readFile('package.json', 'utf8'));
          const result = spawnSync('npm', ['view', `${pkg.name}@${pkg.version}`, 'version', '--json'], {
            encoding: 'utf8',
          });
          if (result.status === 0 && result.stdout.trim()) {
            console.error(`${pkg.name}@${pkg.version} is already published.`);
            process.exit(1);
          }

          const registryOutput = `${result.stdout}\n${result.stderr}`;
          if (result.status !== 0 && !registryOutput.includes('E404')) {
            console.error('Could not verify the version against the npm registry.');
            console.error(registryOutput.trim());
            process.exit(1);
          }

          console.log('Version is available for publication.');
          NODE

      - name: Publish with npm Trusted Publishing
        run: npm publish --access public
